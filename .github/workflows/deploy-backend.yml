name: Deploy Backend

on:
  push:
    branches: ["main"]
    paths:
      - 'backend/**'
      - 'backend/schema.sql'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      # Atualizado para v4
      - uses: actions/checkout@v4

      # Atualizado para v4 e Node 22 (LTS)
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      # 'npm ci' é mais seguro e rápido para o backend
      - name: Install dependencies
        run: npm ci

      - name: Lint Backend
        run: npx eslint backend/src --config eslint.config.js

      - name: Sync D1 Database Schema
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: 'backend'
          command: d1 execute barber-db --remote --file=schema.sql

      # Wrangler Action v3 é a recomendada para 2026
      - name: Deploy Worker
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: 'backend'
          command: deploy
